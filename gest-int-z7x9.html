<script>
function doLogin(){
  var email=document.getElementById('l-email').value.trim();
  var pwd=document.getElementById('l-pwd').value;
  var errEl=document.getElementById('login-err');
  var ei=document.getElementById('l-email');
  var pi=document.getElementById('l-pwd');
  if(email==='incomingzoom@gmail.com' && pwd==='Porticciolo2026!'){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='';
    ei.classList.remove('err');pi.classList.remove('err');errEl.style.display='none';
  } else {
    ei.classList.add('err');pi.classList.add('err');
    errEl.style.display='block';
    pi.value='';
  }
}
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    var ls=document.getElementById('login-screen');
    if(ls&&ls.style.display!=='none') doLogin();
  }
});
</script>

/* ── HELPERS ── */
const toD=s=>new Date(s+"T00:00:00");
const ds=d=>d.toISOString().slice(0,10);
const TODAY=ds(new Date());
const fmtS=d=>d?toD(d).toLocaleDateString("it-IT",{day:"2-digit",month:"short"}):"—";
const fmtL=d=>d?toD(d).toLocaleDateString("it-IT",{day:"2-digit",month:"long",year:"numeric"}):"—";
const nts=(a,b)=>Math.round((toD(b)-toD(a))/86400000);
const eur=n=>"€ "+(n||0).toLocaleString("it-IT",{minimumFractionDigits:0,maximumFractionDigits:0});
const totalPagato=b=>(b.acconti||[]).reduce((s,a)=>s+(+a.importo||0),0);
/* saldato = confermata e pagato >= totale */
const isSaldo=b=>b.status==="Confermata"&&totalPagato(b)>=(b.total||0)&&(b.total||0)>0;
/* costi agenzia: l'utente inserisce valori positivi, noi li trattiamo come uscite (negativo) */
const costoVal=v=>v!==""&&v!==undefined&&v!==null?-Math.abs(+v||0):0;
const totalCostiAgenzia=b=>costoVal(b.commPortali)+costoVal(b.costiPulizie)+costoVal(b.altriCostiImporto);
/* ricavo lordo = total - tassa soggiorno (la tassa va restituita al Comune) */
const ricavoLordo=b=>(b.total||0)-(+b.tassaSoggiorno||0);
/* guadagno netto = ricavo lordo + costi agenzia (negativi) */
const guadagnoNetto=b=>ricavoLordo(b)+totalCostiAgenzia(b);
/* parziale = almeno 1 acconto versato ma non completamente saldato */
const isParz=b=>b.status!=="Cancellata"&&(b.acconti||[]).length>0&&!isSaldo(b);

/* ── FIREBASE SYNC ── */
function loadData(){
  try{
    const s=localStorage.getItem("prenota_structs"),b=localStorage.getItem("prenota_bookings"),sp=localStorage.getItem("prenota_spese");
    return{structs:s?JSON.parse(s):S0,bookings:b?JSON.parse(b):B0,spese:sp?JSON.parse(sp):[]};
  }catch(e){return{structs:S0,bookings:B0,spese:[]};}
}

/* flag per evitare loop: non salvare su Firebase i dati che arrivano DA Firebase */

function saveData(s,b,sp){
  if(_fbUpdating)return; /* ignora salvataggi causati da aggiornamenti Firebase */
  try{localStorage.setItem("prenota_structs",JSON.stringify(s));localStorage.setItem("prenota_bookings",JSON.stringify(b));localStorage.setItem("prenota_spese",JSON.stringify(sp||[]));}catch(e){}
  try{
    db.collection("gestionale").doc("structs").set({data:s});
    db.collection("gestionale").doc("bookings").set({data:b});
    db.collection("gestionale").doc("spese").set({data:sp||[]});
  }catch(e){console.warn("Firebase save error:",e);}
}

function useFirebaseSync(setStructs,setBookings,setSpese){
  useEffect(()=>{
    let unsub1,unsub2,unsub3;
    try{
      unsub1=db.collection("gestionale").doc("structs").onSnapshot({includeMetadataChanges:false},snap=>{
        if(snap.exists&&snap.data()?.data&&!snap.metadata.hasPendingWrites){
          _fbUpdating=true;
          setStructs(snap.data().data);
          try{localStorage.setItem("prenota_structs",JSON.stringify(snap.data().data));}catch(e){}
          _fbUpdating=false;
        }
      });
      unsub2=db.collection("gestionale").doc("bookings").onSnapshot({includeMetadataChanges:false},snap=>{
        if(snap.exists&&snap.data()?.data&&!snap.metadata.hasPendingWrites){
          _fbUpdating=true;
          setBookings(snap.data().data);
          try{localStorage.setItem("prenota_bookings",JSON.stringify(snap.data().data));}catch(e){}
          _fbUpdating=false;
        }
      });
      unsub3=db.collection("gestionale").doc("spese").onSnapshot({includeMetadataChanges:false},snap=>{
        if(snap.exists&&snap.data()?.data&&!snap.metadata.hasPendingWrites){
          _fbUpdating=true;
          setSpese(snap.data().data);
          try{localStorage.setItem("prenota_spese",JSON.stringify(snap.data().data));}catch(e){}
          _fbUpdating=false;
        }
      });
    }catch(e){console.warn("Firebase sync error:",e);}
    return()=>{if(unsub1)unsub1();if(unsub2)unsub2();if(unsub3)unsub3();};
  },[]);
}

    if(form.prezzoApp!==""&&form.prezzoApp!==undefined&&+form.prezzoApp<0)e.prezzoApp="Deve essere ≥ 0";

        h(Fld,{label:"✉️ Email"},h("input",{className:"inp",type:"email",value:form.email||"",onChange:upd("email"),placeholder:"Es. mario@email.com"}))
      ),
      h("div",{className:"g2"},
        h("div",null,
          h("div",{className:"fl"},"CHECK-IN",h("span",{style:{color:"#ef4444",marginLeft:2}},"*")),
          h("div",{className:"date-inp-wrap"+(errs.checkin?" err":"")},
            h("input",{type:"date",value:form.checkin,onChange:e=>{upd("checkin")(e);if(form.checkout&&e.target.value>=form.checkout)setForm(p=>({...p,checkout:""}));}})
          ),

        ),
        h("div",null,
          h("div",{className:"fl"},"CHECK-OUT",h("span",{style:{color:"#ef4444",marginLeft:2}},"*")),
          h("div",{className:"date-inp-wrap"+(errs.checkout?" err":"")},
            h("input",{type:"date",value:form.checkout,min:form.checkin||undefined,onChange:upd("checkout")})

        )
      ),
      h("div",{className:"g2"},
        h(Fld,{label:"Persone",required:true},
          h("input",{className:"inp"+(errs.persons?" err":""),type:"number",min:1,value:form.persons,onChange:upd("persons")}),
          errs.persons&&h("div",{style:{fontSize:10,color:"#ef4444",marginTop:2}},errs.persons)
        ),

        h("div",{className:"g2"},
          h(Fld,{label:"Prezzo appartamento",required:true},

          )
        ),
        !!form.animali&&h("div",{style:{marginTop:8}},
          h(Fld,{label:"Suppl. animali",required:true},
            h("input",{className:"inp"+(errs.supplAnimali?" err":""),type:"number",min:0,value:form.supplAnimali||"",onChange:upd("supplAnimali"),placeholder:"0"}),
            errs.supplAnimali&&h("div",{style:{fontSize:10,color:"#ef4444",marginTop:2}},errs.supplAnimali)

      h(Fld,{label:"Note"},h("textarea",{className:"inp",rows:2,value:form.notes,onChange:upd("notes"),placeholder:"Richieste speciali..."})),

      /* ── DETTAGLIO COSTI AGENZIA ── */

            const fTassa=+form.tassaSoggiorno||0;

/* ══ GANTT MULTI-MESE ══ */
function buildDays(y,m,n){
  const days=[];
  for(let i=0;i<n;i++){const cy=y+Math.floor((m+i)/12),cm=(m+i)%12,dim=new Date(cy,cm+1,0).getDate();for(let d=1;d<=dim;d++)days.push(new Date(cy,cm,d));}
  return days;
}

function loadScript(src,cb){
  var s=document.createElement("script");
  s.src=src;
  s.onload=cb;
  s.onerror=function(){console.warn("Script load failed:",src);cb();};
  document.head.appendChild(s);
}
